services:
  sftpgo:
    image: drakkan/sftpgo:v2.7.5
    restart: unless-stopped
    environment:
      SFTPGO_HTTPD__BINDINGS__0__ADDRESS: 0.0.0.0
      SFTPGO_HTTPD__BINDINGS__0__PORT: "5000"
      SFTPGO_SFTPD__BINDINGS__0__PORT: "2022"
      SFTPGO_DATA_PROVIDER__CREATE_DEFAULT_ADMIN: "true"
      SFTPGO_DEFAULT_ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      SFTPGO_DEFAULT_ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    ports:
      - "5000:5000"
      - "2022"
    volumes:
      - sftpgodata:/var/lib/sftpgo
      - sftpgohome:/srv/sftpgo

volumes:
  sftpgodata:
  sftpgohome:
