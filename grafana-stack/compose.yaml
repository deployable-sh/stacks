services:
  grafana:
    build: ./grafana
    restart: unless-stopped
    environment:
      GF_SERVER_HTTP_PORT: "5000"
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: ${GF_ROOT_URL:-http://localhost:5000}
    ports:
      - "5000:5000"
    volumes:
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus
      - loki

  prometheus:
    build: ./prometheus
    restart: unless-stopped
    volumes:
      - promdata:/prometheus

  loki:
    image: grafana/loki:3
    restart: unless-stopped
    volumes:
      - lokidata:/loki

volumes:
  grafanadata:
  promdata:
  lokidata:
