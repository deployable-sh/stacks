services:
  plane:
    image: makeplane/plane-aio-community:v1.3.1
    restart: unless-stopped
    environment:
      SITE_ADDRESS: ":5000"
      WEB_URL: ${WEB_URL:-http://localhost:5000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5000}
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: postgresql://plane:plane-local-only@db:5432/plane
      REDIS_URL: redis://redis:6379/
      AMQP_URL: amqp://plane:plane-local-only@rabbitmq:5672/plane
      USE_MINIO: "1"
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio-access}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minio-secret-local-only}
      AWS_S3_ENDPOINT_URL: http://minio:9000
      AWS_S3_BUCKET_NAME: ${MINIO_BUCKET:-uploads}
    ports:
      - "5000:5000"
    depends_on:
      - db
      - redis
      - rabbitmq
      - minio
    volumes:
      - planedata:/app/data

  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: plane
      POSTGRES_PASSWORD: plane-local-only
      POSTGRES_DB: plane
    volumes:
      - dbdata:/var/lib/postgresql/data

  redis:
    image: valkey/valkey:9.1
    restart: unless-stopped
    volumes:
      - redisdata:/data

  rabbitmq:
    image: rabbitmq:4-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: plane
      RABBITMQ_DEFAULT_PASS: plane-local-only
      RABBITMQ_DEFAULT_VHOST: plane
    ports:
      - "5672:5672"
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: ["server", "/data", "--address", ":9000"]
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio-access}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio-secret-local-only}
      MINIO_BUCKET: ${MINIO_BUCKET:-uploads}
    ports:
      - "9000:9000"
    volumes:
      - miniodata:/data

volumes:
  planedata:
  dbdata:
  redisdata:
  rabbitmqdata:
  miniodata:
