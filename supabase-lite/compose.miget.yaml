services:
  kong:
    x-miget:
      ram: "128"
    environment:
      # Miget pods are dual-stack; bind both families so the alias
      # Service's IPv6 VIP accepts connections.
      KONG_PROXY_LISTEN: "0.0.0.0:5000, [::]:5000"
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME:?}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:?}

  auth:
    x-miget: { ram: "128", private: true }
    environment:
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      API_EXTERNAL_URL: ${MIGET_PUBLIC_URL}
      SITE_URL: ${MIGET_PUBLIC_URL}

  rest:
    x-miget: { ram: "384", private: true }
    environment:
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}

  studio:
    x-miget: { ram: "384", private: true }
    environment:
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      PG_META_CRYPTO_KEY: ${PG_META_CRYPTO_KEY:?}
      SUPABASE_PUBLIC_URL: ${MIGET_PUBLIC_URL}
      # Keep Next.js on the compose-declared port: kong routes to
      # supabase-studio:3000 and the healthcheck probes it. Without this
      # the platform's PORT default moves studio to 5000.
      PORT: "3000"
      HOSTNAME: "::"
      # Studio's Node fetch uses only the first DNS answer; the compose
      # alias Services are dual-stack but kong/meta bind IPv4 only, so the
      # AAAA-first answer connects to a dead IPv6 VIP (ECONNREFUSED on the
      # auth/meta API calls). Prefer A records.
      NODE_OPTIONS: "--dns-result-order=ipv4first"

  meta:
    x-miget: { ram: "192", private: true }
    environment:
      PG_META_HOST: "::"
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      PG_META_CRYPTO_KEY: ${PG_META_CRYPTO_KEY:?}

  db:
    x-miget:
      ram: "512"
      private: true
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}

volumes:
  dbdata:
    x-miget: { size: "8000", type: RWO }
