services:
  agent-box:
    build: .
    image: miget-agent-box:local
    restart: unless-stopped
    environment:
      TTYD_USERNAME: ${TTYD_USERNAME:-agent}
      TTYD_PASSWORD: ${TTYD_PASSWORD}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ports:
      - "5000:5000"
    volumes:
      - workspace:/workspace

volumes:
  workspace:
