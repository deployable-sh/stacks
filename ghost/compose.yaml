services:
  ghost:
    image: ghost:6
    restart: unless-stopped
    environment:
      NODE_ENV: production
      url: ${GHOST_URL:-http://localhost:5000}
      server__port: "5000"
      database__client: mysql
      database__connection__host: db
      database__connection__port: "3306"
      database__connection__user: ghost
      database__connection__password: ghost-local-only
      database__connection__database: ghost
    ports:
      - "5000:5000"
    volumes:
      - ghostcontent:/var/lib/ghost/content
    depends_on:
      - db

  db:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root-local-only
      MYSQL_USER: ghost
      MYSQL_PASSWORD: ghost-local-only
      MYSQL_DATABASE: ghost
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql

volumes:
  ghostcontent:
  dbdata:
