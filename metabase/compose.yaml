services:
  metabase:
    image: metabase/metabase:v0.63.1.x
    restart: unless-stopped
    environment:
      MB_JETTY_PORT: "5000"
      MB_DB_TYPE: postgres
      MB_DB_HOST: db
      MB_DB_PORT: "5432"
      MB_DB_DBNAME: metabase
      MB_DB_USER: metabase
      MB_DB_PASS: metabase-local-only
      MB_SITE_URL: ${MB_SITE_URL:-http://localhost:5000}
      JAVA_TOOL_OPTIONS: -Xmx1g
    ports:
      - "5000:5000"
    depends_on:
      - db

  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: metabase
      POSTGRES_PASSWORD: metabase-local-only
      POSTGRES_DB: metabase
    volumes:
      - dbdata:/var/lib/postgresql/data

volumes:
  dbdata:
