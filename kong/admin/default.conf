# Kong Manager (web UI) + Admin API behind one origin with basic auth.
# Serving both from the same origin lets the Manager reach the Admin API
# at the relative path /api (KONG_ADMIN_GUI_API_URL), no domain to
# configure and no CORS.
server {
    listen 5000;

    auth_basic           "Kong Manager";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Keep the `//host/api/...` form intact (see the /api normalize block below)
    # rather than letting nginx collapse the leading slashes before matching.
    merge_slashes off;

    # Kong Manager rejects a bare-path API URL (it prepends `https://`,
    # yielding an invalid `https:///api`), but the public hostname is only
    # known at request time, qualify it on the way through.
    location = /kconfig.js {
        proxy_pass http://kong:8002;
        proxy_set_header Host $host;
        proxy_set_header Accept-Encoding "";
        sub_filter_types application/javascript;
        sub_filter "'ADMIN_API_URL': '/api'" "'ADMIN_API_URL': '//$http_host/api'";
        sub_filter_once on;
    }

    # Admin API, Kong Manager calls /api/...; the prefix is stripped here.
    location /api/ {
        proxy_pass http://kong:8001/;
        proxy_set_header Host $host;
    }

    # Some Kong Manager builds emit ADMIN_API_URL (//$host/api) as a LITERAL
    # request path (//host/api/...) instead of resolving it protocol-relative,
    # so those calls would fall through to the static UI and return index.html
    # (empty lists). Normalize them back to /api/... so they hit the Admin API.
    location ~ "^//[^/]+/api/" {
        rewrite "^//[^/]+(/api/.*)$" $1 last;
    }

    # Kong Manager static UI.
    location / {
        proxy_pass http://kong:8002;
        proxy_set_header Host $host;
    }
}
