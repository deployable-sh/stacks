services:
  hasura:
    image: hasura/graphql-engine:v2.49.5
    restart: unless-stopped
    environment:
      HASURA_GRAPHQL_SERVER_PORT: "5000"
      HASURA_GRAPHQL_DATABASE_URL: postgres://hasura:hasura-local-only@db:5432/hasura
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_ADMIN_SECRET}
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_DEV_MODE: "false"
      HASURA_GRAPHQL_ENABLED_LOG_TYPES: startup, http-log, webhook-log
    ports:
      - "5000:5000"
    depends_on:
      - db

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: hasura
      POSTGRES_PASSWORD: hasura-local-only
      POSTGRES_DB: hasura
    volumes:
      - dbdata:/var/lib/postgresql/data

volumes:
  dbdata:
