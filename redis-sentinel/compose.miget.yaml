services:
  redis-master:
    x-miget:
      ram: "512"
      private: true
  redis-replica-1:
    x-miget:
      ram: "512"
      private: true
  redis-replica-2:
    x-miget:
      ram: "512"
      private: true
  redis-sentinel-1:
    x-miget:
      ram: "128"
      private: true
    ports:
      - "26379"
  redis-sentinel-2:
    x-miget:
      ram: "128"
      private: true
    ports:
      - "26379"
  redis-sentinel-3:
    x-miget:
      ram: "128"
      private: true
    ports:
      - "26379"

volumes:
  master-data:
    x-miget: { size: "5000", type: RWO }
  replica1-data:
    x-miget: { size: "5000", type: RWO }
  replica2-data:
    x-miget: { size: "5000", type: RWO }
