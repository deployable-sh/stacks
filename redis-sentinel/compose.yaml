services:
  redis-master:
    build: .
    restart: unless-stopped
    environment:
      REDIS_ROLE: master
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_MASTER_HOST: redis-master
      REDIS_ANNOUNCE_HOST: redis-master
    volumes:
      - master-data:/data

  redis-replica-1:
    build: .
    restart: unless-stopped
    environment:
      REDIS_ROLE: replica
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_MASTER_HOST: redis-master
      REDIS_ANNOUNCE_HOST: redis-replica-1
    depends_on: [redis-master]
    volumes:
      - replica1-data:/data

  redis-replica-2:
    build: .
    restart: unless-stopped
    environment:
      REDIS_ROLE: replica
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_MASTER_HOST: redis-master
      REDIS_ANNOUNCE_HOST: redis-replica-2
    depends_on: [redis-master]
    volumes:
      - replica2-data:/data

  redis-sentinel-1:
    build: .
    restart: unless-stopped
    environment:
      REDIS_ROLE: sentinel
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_MASTER_HOST: redis-master
    depends_on: [redis-master, redis-replica-1, redis-replica-2]

  redis-sentinel-2:
    build: .
    restart: unless-stopped
    environment:
      REDIS_ROLE: sentinel
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_MASTER_HOST: redis-master
    depends_on: [redis-master, redis-replica-1, redis-replica-2]

  redis-sentinel-3:
    build: .
    restart: unless-stopped
    environment:
      REDIS_ROLE: sentinel
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_MASTER_HOST: redis-master
    depends_on: [redis-master, redis-replica-1, redis-replica-2]

volumes:
  master-data:
  replica1-data:
  replica2-data:
