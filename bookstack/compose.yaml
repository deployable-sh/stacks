services:
  bookstack:
    build: .
    restart: unless-stopped
    environment:
      APP_URL: ${APP_URL:-http://localhost:5000}
      APP_KEY: ${APP_KEY}
      DB_HOST: db
      DB_PORT: "3306"
      DB_DATABASE: bookstack
      DB_USERNAME: bookstack
      DB_PASSWORD: bookstack-local-only
      APP_PROXIES: "*"
      PUID: "1000"
      PGID: "1000"
      TZ: Etc/UTC
    ports:
      - "5000:5000"
    depends_on:
      - db
    volumes:
      - config:/config

  db:
    image: mariadb:12
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: bookstack
      MARIADB_USER: bookstack
      MARIADB_PASSWORD: bookstack-local-only
      MARIADB_ROOT_PASSWORD: root-local-only
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql

volumes:
  config:
  dbdata:
