services:
  docmost:
    x-miget:
      ram: "1024"
    environment:
      DATABASE_URL: ${{db.url}}
      REDIS_URL: ${{redis.url}}

  db:
    x-miget:
      managed: postgres
      version: "16"
      extensions: [vector]
      cpu: "500m"
      ram: "1Gi"
      storage: "10Gi"

  redis:
    x-miget:
      managed: valkey
      ram: "256Mi"
