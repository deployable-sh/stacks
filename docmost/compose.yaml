services:
  docmost:
    image: docmost/docmost:0.24.0
    restart: unless-stopped
    environment:
      APP_URL: ${APP_URL:-http://localhost:5000}
      PORT: "5000"
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: postgresql://docmost:docmost-local-only@db:5432/docmost
      REDIS_URL: redis://redis:6379
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      AWS_S3_ENDPOINT: ${AWS_S3_ENDPOINT:-}
      AWS_S3_REGION: ${AWS_S3_REGION:-auto}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_S3_ACCESS_KEY_ID: ${AWS_S3_ACCESS_KEY_ID:-}
      AWS_S3_SECRET_ACCESS_KEY: ${AWS_S3_SECRET_ACCESS_KEY:-}
      AWS_S3_FORCE_PATH_STYLE: ${AWS_S3_FORCE_PATH_STYLE:-true}
    ports:
      - "5000:5000"
    depends_on:
      - db
      - redis
    volumes:
      - storage:/app/data/storage

  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: docmost
      POSTGRES_PASSWORD: docmost-local-only
      POSTGRES_DB: docmost
    volumes:
      - dbdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redisdata:/data

volumes:
  storage:
  dbdata:
  redisdata:
