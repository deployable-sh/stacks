services:
  tooljet:
    image: tooljet/tooljet:latest
    restart: unless-stopped
    command: ["npm", "run", "start:prod"]
    environment:
      PORT: "5000"
      TOOLJET_HOST: ${TOOLJET_HOST:-http://localhost:5000}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      LOCKBOX_MASTER_KEY: ${LOCKBOX_MASTER_KEY}
      DEPLOYMENT_PLATFORM: docker
      PG_HOST: db
      PG_PORT: "5432"
      PG_USER: tooljet
      PG_PASS: tooljet-local-only
      PG_DB: tooljet
      TOOLJET_DB_HOST: db
      TOOLJET_DB_PORT: "5432"
      TOOLJET_DB_USER: tooljet
      TOOLJET_DB_PASS: tooljet-local-only
      TOOLJET_DB: tooljet_db
      PGRST_JWT_SECRET: ${PGRST_JWT_SECRET}
      PGRST_DB_URI: postgres://tooljet:tooljet-local-only@db:5432/tooljet_db
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    ports:
      - "5000:5000"
    depends_on:
      - db
      - redis

  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: tooljet
      POSTGRES_PASSWORD: tooljet-local-only
      POSTGRES_DB: tooljet
    volumes:
      - dbdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped

volumes:
  dbdata:
