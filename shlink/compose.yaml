services:
  shlink:
    image: shlinkio/shlink:4.6.0
    restart: unless-stopped
    environment:
      PORT: "5000"
      DEFAULT_DOMAIN: ${DEFAULT_DOMAIN:-localhost:5000}
      IS_HTTPS_ENABLED: ${IS_HTTPS_ENABLED:-false}
      INITIAL_API_KEY: ${INITIAL_API_KEY}
      DB_DRIVER: postgres
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: shlink
      DB_USER: shlink
      DB_PASSWORD: shlink-local-only
      GEOLITE_LICENSE_KEY: ${GEOLITE_LICENSE_KEY:-}
    ports:
      - "5000:5000"
    depends_on:
      - db

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: shlink
      POSTGRES_PASSWORD: shlink-local-only
      POSTGRES_DB: shlink
    volumes:
      - dbdata:/var/lib/postgresql/data

volumes:
  dbdata:
