# Cluster formation: every node knows the full member list and the cluster
# assembles on first boot. Node names match the compose service names.
cluster_formation.peer_discovery_backend = classic_config
cluster_formation.classic_config.nodes.1 = rabbit@rmq-1
cluster_formation.classic_config.nodes.2 = rabbit@rmq-2
cluster_formation.classic_config.nodes.3 = rabbit@rmq-3

# With 3 nodes, pause the minority side on a network partition.
cluster_partition_handling = pause_minority

# Management UI on 5000 (Miget's ingress only reaches TCP/5000).
management.tcp.port = 5000

# Demo credentials, CHANGE before real use.
default_user = admin
default_pass = changeme-rmq
loopback_users.guest = false

vm_memory_high_watermark.relative = 0.6
