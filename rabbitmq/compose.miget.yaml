x-node: &node
  x-miget:
    ram: "1024"
    private: true

services:
  rmq-1:
    x-miget:
      ram: "1024"
  rmq-2: *node
  rmq-3: *node

volumes:
  rmqdata-1:
    x-miget: { size: "2000", type: RWO }
  rmqdata-2:
    x-miget: { size: "2000", type: RWO }
  rmqdata-3:
    x-miget: { size: "2000", type: RWO }
