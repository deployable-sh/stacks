services:
  bagisto:
    build: .
    restart: unless-stopped
    environment:
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-http://localhost:5000}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: "3306"
      DB_DATABASE: bagisto
      DB_USERNAME: bagisto
      DB_PASSWORD: bagisto-local-only
    ports:
      - "5000:5000"
    volumes:
      - bagistostorage:/var/www/bagisto/storage
    depends_on:
      - db

  db:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root-local-only
      MYSQL_USER: bagisto
      MYSQL_PASSWORD: bagisto-local-only
      MYSQL_DATABASE: bagisto
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql

volumes:
  bagistostorage:
  dbdata:
