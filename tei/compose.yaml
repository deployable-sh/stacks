services:
  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    restart: unless-stopped
    environment:
      PORT: "5000"
      MODEL_ID: ${MODEL_ID:-BAAI/bge-small-en-v1.5}
      HUGGINGFACE_HUB_CACHE: /data
    ports:
      - "5000:5000"
    volumes:
      - modelcache:/data

volumes:
  modelcache:
