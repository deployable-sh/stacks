x-glitchtip: &glitchtip
  image: glitchtip/glitchtip:6.2.2
  restart: unless-stopped

x-glitchtip-env: &glitchtip-env
  DATABASE_URL: postgres://glitchtip:glitchtip-local-only@db:5432/glitchtip
  REDIS_URL: redis://queue:6379/0
  SECRET_KEY: ${SECRET_KEY}
  EMAIL_URL: consolemail://
  GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:-http://localhost:5000}
  ENABLE_OPEN_USER_REGISTRATION: "false"
  CELERY_WORKER_AUTOSCALE: "1,3"

services:
  web:
    <<: *glitchtip
    environment:
      <<: *glitchtip-env
      PORT: "5000"
    ports:
      - "5000:5000"
    depends_on:
      - db
      - queue

  worker:
    <<: *glitchtip
    command:
      - ./bin/run-celery-with-beat.sh
    environment: *glitchtip-env
    depends_on:
      - db
      - queue

  migrate:
    <<: *glitchtip
    command:
      - bash
      - -c
      - ./manage.py migrate && sleep infinity
    environment: *glitchtip-env
    depends_on:
      - db

  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: glitchtip
      POSTGRES_PASSWORD: glitchtip-local-only
      POSTGRES_DB: glitchtip
    volumes:
      - dbdata:/var/lib/postgresql/data

  queue:
    image: valkey/valkey:7.2
    restart: unless-stopped

volumes:
  dbdata:
