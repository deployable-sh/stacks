x-wiring: &wiring
  DATABASE_URL: ${{db.url}}
  REDIS_URL: redis://:${{queue.password}}@${{queue.host}}:${{queue.port}}/0

services:
  web:
    x-miget:
      ram: "1024"
    environment: *wiring

  worker:
    x-miget:
      ram: "1024"
      private: true
    environment: *wiring

  migrate:
    x-miget:
      ram: "512"
      private: true
    environment: *wiring

  db:
    x-miget:
      managed: postgres
      cpu: "500m"
      ram: "1Gi"
      storage: "5Gi"

  queue:
    x-miget:
      managed: valkey
      ram: "256Mi"
