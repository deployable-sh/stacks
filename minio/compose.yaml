services:
  minio:
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command:
      - server
      - /data
      - --console-address=:5000
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "5000:5000"
      - "9000"
    volumes:
      - miniodata:/data

volumes:
  miniodata:
