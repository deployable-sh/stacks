services:
  bugsink:
    image: bugsink/bugsink:2.4.0
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY}
      CREATE_SUPERUSER: ${ADMIN_EMAIL}:${ADMIN_PASSWORD}
      DATABASE_URL: postgres://bugsink:bugsink-local-only@db:5432/bugsink
      BASE_URL: ${BASE_URL:-http://localhost:5000}
      PORT: "5000"
      BEHIND_HTTPS_PROXY: "false"
    ports:
      - "5000:5000"
    depends_on:
      - db

  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: bugsink
      POSTGRES_PASSWORD: bugsink-local-only
      POSTGRES_DB: bugsink
    volumes:
      - dbdata:/var/lib/postgresql/data

volumes:
  dbdata:
