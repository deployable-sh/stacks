services:
  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:v0.91.3
    restart: unless-stopped
    environment:
      ZO_HTTP_PORT: "5000"
      ZO_GRPC_PORT: "5081"
      ZO_ROOT_USER_EMAIL: ${ZO_ROOT_USER_EMAIL}
      ZO_ROOT_USER_PASSWORD: ${ZO_ROOT_USER_PASSWORD}
      ZO_DATA_DIR: /data
      ZO_LOCAL_MODE_STORAGE: ${ZO_LOCAL_MODE_STORAGE:-disk}
      ZO_S3_PROVIDER: ${ZO_S3_PROVIDER:-s3}
      ZO_S3_SERVER_URL: ${ZO_S3_SERVER_URL:-}
      ZO_S3_REGION_NAME: ${ZO_S3_REGION_NAME:-us-east-1}
      ZO_S3_ACCESS_KEY: ${ZO_S3_ACCESS_KEY:-}
      ZO_S3_SECRET_KEY: ${ZO_S3_SECRET_KEY:-}
      ZO_S3_BUCKET_NAME: ${ZO_S3_BUCKET_NAME:-}
    ports:
      - "5000:5000"
      - "5081"
    volumes:
      - oodata:/data

volumes:
  oodata:
