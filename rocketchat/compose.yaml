services:
  rocketchat:
    image: rocketchat/rocket.chat:8.6.1
    restart: unless-stopped
    environment:
      PORT: "5000"
      ROOT_URL: ${ROOT_URL:-http://localhost:5000}
      MONGO_URL: ${MONGO_URL:-mongodb://mongo:27017/rocketchat?replicaSet=rs0}
    ports:
      - "5000:5000"
    depends_on:
      - mongo

  mongo:
    image: mongo:8
    restart: unless-stopped
    command:
      - sh
      - -c
      - |
        ( until mongosh --quiet --eval 'db.runCommand({ping:1})' >/dev/null 2>&1; do sleep 2; done
          mongosh --quiet --eval 'try { rs.status().ok } catch (e) { rs.initiate({_id:"rs0",members:[{_id:0,host:"mongo:27017"}]}) }'
        ) &
        exec mongod --replSet rs0 --bind_ip_all
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

volumes:
  mongodata:
