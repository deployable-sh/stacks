services:
  hermes:
    image: nousresearch/hermes-agent:latest
    restart: unless-stopped
    command:
      - gateway
      - run
    environment:
      HERMES_DASHBOARD: "1"
      HERMES_DASHBOARD_PORT: "5000"
      HERMES_DASHBOARD_HOST: 0.0.0.0
      HERMES_DASHBOARD_BASIC_AUTH_USERNAME: ${HERMES_USERNAME:-admin}
      HERMES_DASHBOARD_BASIC_AUTH_PASSWORD: ${HERMES_PASSWORD}
      HERMES_DASHBOARD_BASIC_AUTH_SECRET: ${HERMES_SESSION_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ports:
      - "5000:5000"
      - "8642"
    volumes:
      - hermesdata:/opt/data

volumes:
  hermesdata:
