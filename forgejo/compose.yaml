services:
  forgejo:
    image: codeberg.org/forgejo/forgejo:15
    restart: unless-stopped
    environment:
      FORGEJO__server__HTTP_PORT: "5000"
      FORGEJO__server__ROOT_URL: ${ROOT_URL:-http://localhost:5000/}
      FORGEJO__server__DISABLE_SSH: "true"
      FORGEJO__database__DB_TYPE: postgres
      FORGEJO__database__HOST: db:5432
      FORGEJO__database__NAME: forgejo
      FORGEJO__database__USER: forgejo
      FORGEJO__database__PASSWD: forgejo-local-only
    ports:
      - "5000:5000"
    volumes:
      - forgejodata:/data
    depends_on:
      - db

  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: forgejo
      POSTGRES_PASSWORD: forgejo-local-only
      POSTGRES_DB: forgejo
    volumes:
      - dbdata:/var/lib/postgresql/data

volumes:
  forgejodata:
  dbdata:
