x-wiring: &wiring
  AUTHENTIK_POSTGRESQL__HOST: ${{db.host}}
  AUTHENTIK_POSTGRESQL__PORT: ${{db.port}}
  AUTHENTIK_POSTGRESQL__NAME: ${{db.database}}
  AUTHENTIK_POSTGRESQL__USER: ${{db.username}}
  AUTHENTIK_POSTGRESQL__PASSWORD: ${{db.password}}
  AUTHENTIK_POSTGRESQL__SSLMODE: require

services:
  server:
    x-miget:
      ram: "1024"
    environment: *wiring

  worker:
    x-miget:
      ram: "768"
      private: true
    environment: *wiring

  db:
    x-miget:
      managed: postgres
      cpu: "500m"
      ram: "1Gi"
      storage: "5Gi"

volumes:
  media:
    x-miget: { size: "1000", type: RWX }
  templates:
    x-miget: { size: "500", type: RWX }
