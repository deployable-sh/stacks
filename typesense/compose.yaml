services:
  typesense:
    image: typesense/typesense:30.2
    restart: unless-stopped
    environment:
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY}
      TYPESENSE_DATA_DIR: /data
      TYPESENSE_API_PORT: "5000"
      TYPESENSE_ENABLE_CORS: "true"
    ports:
      - "5000:5000"
    volumes:
      - typesensedata:/data

volumes:
  typesensedata:
