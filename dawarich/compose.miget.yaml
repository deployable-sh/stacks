services:
  web:
    x-miget:
      ram: "1024"
    environment:
      REDIS_URL: ${{redis.url}}
      APPLICATION_PROTOCOL: https
      APPLICATION_HOSTS: ${MIGET_PUBLIC_HOST}

  sidekiq:
    x-miget:
      ram: "1024"
      private: true
    environment:
      REDIS_URL: ${{redis.url}}

  db:
    x-miget:
      ram: "1024"
      private: true

  redis:
    x-miget:
      managed: valkey
      ram: "512Mi"

volumes:
  storage:
    x-miget: { size: "20000", type: RWX }
  watched:
    x-miget: { size: "2000", type: RWX }
  dbdata:
    x-miget: { size: "10000", type: RWO }
