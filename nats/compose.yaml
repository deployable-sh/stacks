x-node: &node
  image: nats:2.14-alpine
  restart: unless-stopped
  healthcheck:
    test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz?js-server-only=true"]
    interval: 10s
    timeout: 5s
    retries: 6

services:
  nats-0:
    <<: *node
    command:
      - "--server_name=nats-0"
      - "--cluster_name=NATS"
      - "--cluster=nats://0.0.0.0:6222"
      - "--routes=nats://nats-0:6222,nats://nats-1:6222,nats://nats-2:6222"
      - "--jetstream"
      - "--store_dir=/data"
      - "-m=8222"
    volumes:
      - natsdata-0:/data

  nats-1:
    <<: *node
    command:
      - "--server_name=nats-1"
      - "--cluster_name=NATS"
      - "--cluster=nats://0.0.0.0:6222"
      - "--routes=nats://nats-0:6222,nats://nats-1:6222,nats://nats-2:6222"
      - "--jetstream"
      - "--store_dir=/data"
      - "-m=8222"
    volumes:
      - natsdata-1:/data

  nats-2:
    <<: *node
    command:
      - "--server_name=nats-2"
      - "--cluster_name=NATS"
      - "--cluster=nats://0.0.0.0:6222"
      - "--routes=nats://nats-0:6222,nats://nats-1:6222,nats://nats-2:6222"
      - "--jetstream"
      - "--store_dir=/data"
      - "-m=8222"
    volumes:
      - natsdata-2:/data

volumes:
  natsdata-0:
  natsdata-1:
  natsdata-2:
