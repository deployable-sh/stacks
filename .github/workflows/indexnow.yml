name: IndexNow

on:
  schedule:
    - cron: '45 5 * * *'
  workflow_dispatch:

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: node deployable-sh/scripts/submit-indexnow.mjs
