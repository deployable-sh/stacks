services:
  open-webui:
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:5000/health >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    image: ghcr.io/open-webui/open-webui:v0.10.2
    restart: unless-stopped
    environment:
      PORT: "5000"
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY}
      OPENAI_API_BASE_URL: ${OPENAI_API_BASE_URL:-https://api.openai.com/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ENABLE_OLLAMA_API: "false"
    ports:
      - "5000:5000"
    volumes:
      - webuidata:/app/backend/data

volumes:
  webuidata:
