services:
  writebook:
    image: ghcr.io/basecamp/writebook:v1.2.0
    restart: unless-stopped
    environment:
      HTTP_PORT: "5000"
      DISABLE_SSL: "true"
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
    ports:
      - "5000:5000"
    volumes:
      - storage:/rails/storage

volumes:
  storage:
