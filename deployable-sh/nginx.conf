server {
    listen 5000;
    root /usr/share/nginx/html;
    index index.html;

    # behind a TLS proxy: emit relative redirects so trailing-slash 301s keep
    # the original scheme/host instead of leaking http://...:5000
    absolute_redirect off;
    port_in_redirect off;

    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml text/plain;

    location /_astro/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri $uri/ /404.html;
    }

    error_page 404 /404.html;
}
