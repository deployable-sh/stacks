services:
  app:
    build:
      context: https://github.com/open-mercato/open-mercato.git
      args:
        CONTAINER_PORT: "5000"
    restart: unless-stopped
    user: "0"
    working_dir: /app/apps/mercato
    command:
      - /bin/sh
      - -lc
      - |
        export MEILISEARCH_API_KEY="$MEILI_MASTER_KEY"
        INIT_COMMAND='yarn mercato init' sh /app/docker/scripts/init-or-migrate.sh
        yarn start
    environment:
      PORT: "5000"
      NODE_ENV: production
      NODE_OPTIONS: --max-old-space-size=2560
      APP_URL: ${APP_URL:-http://localhost:5000}
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://mercato:mercato-local-only@db:5432/mercato
      CACHE_STRATEGY: redis
      CACHE_REDIS_URL: redis://cache:6379
      MEILISEARCH_HOST: http://search:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?Meilisearch master key required}
      OM_INIT_SUPERADMIN_EMAIL: ${OM_INIT_SUPERADMIN_EMAIL}
      OM_INIT_SUPERADMIN_PASSWORD: ${OM_INIT_SUPERADMIN_PASSWORD}
      TENANT_DATA_ENCRYPTION: "true"
      TENANT_DATA_ENCRYPTION_KEY: ${TENANT_DATA_ENCRYPTION_KEY}
      DEMO_MODE: "false"
      SELF_SERVICE_ONBOARDING_ENABLED: "false"
    ports:
      - "5000:5000"
    volumes:
      - initmarker:/tmp/init-marker
      - attachments:/app/apps/mercato/storage
    depends_on:
      - db
      - cache
      - search

  db:
    ports:
    - "5432"
    image: pgvector/pgvector:pg17-trixie
    restart: unless-stopped
    environment:
      POSTGRES_USER: mercato
      POSTGRES_PASSWORD: mercato-local-only
      POSTGRES_DB: mercato
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - dbdata:/var/lib/postgresql/data

  cache:
    build: ./cache
    restart: unless-stopped
    ports:
      - "6379"

  search:
    image: getmeili/meilisearch:v1.50
    restart: unless-stopped
    environment:
      MEILI_ENV: production
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?Meilisearch master key required}
      MEILI_DB_PATH: /meili_data/data.ms
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700"
    volumes:
      - searchdata:/meili_data

volumes:
  dbdata:
  searchdata:
  attachments:
  initmarker:
