x-broker: &broker
  x-miget:
    ram: "2048"
    private: true

services:
  kafka-1: *broker
  kafka-2: *broker
  kafka-3: *broker

  kafka-ui:
    x-miget:
      ram: "1024"

volumes:
  kafkadata-1:
    x-miget: { size: "10000", type: RWO }
  kafkadata-2:
    x-miget: { size: "10000", type: RWO }
  kafkadata-3:
    x-miget: { size: "10000", type: RWO }
