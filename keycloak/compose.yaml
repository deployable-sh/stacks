services:
  keycloak:
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/5000"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    image: quay.io/keycloak/keycloak:26.7
    restart: unless-stopped
    command:
      - start
      - --http-enabled=true
      - --http-port=5000
      - --hostname-strict=false
      - --proxy-headers=xforwarded
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: db
      KC_DB_URL_PORT: "5432"
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak-local-only
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
    ports:
      - "5000:5000"
    depends_on:
      - db

  db:
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 5
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak-local-only
      POSTGRES_DB: keycloak
    volumes:
      - dbdata:/var/lib/postgresql/data

volumes:
  dbdata:
