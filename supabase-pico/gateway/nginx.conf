# One worker, always: the default worker_processes auto spawns one per host
# core and multiplies memory for no benefit at this scale.
worker_processes 1;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/json;
  # The apikey maps use full JWTs (~230 chars) as keys; the default
  # 64-byte bucket cannot hold them.
  map_hash_bucket_size 512;
  access_log /dev/stdout;
  error_log /dev/stderr warn;
  sendfile on;
  keepalive_timeout 65;
  include /etc/nginx/conf.d/*.conf;
}
