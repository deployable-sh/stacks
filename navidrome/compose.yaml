services:
  navidrome:
    image: deluan/navidrome:0.62.0
    restart: unless-stopped
    environment:
      ND_PORT: "5000"
      ND_MUSICFOLDER: /music
      ND_DATAFOLDER: /data
      ND_SCANNER_SCHEDULE: "@every 1h"
      ND_LOGLEVEL: info
    ports:
      - "5000:5000"
    volumes:
      - music:/music
      - navidromedata:/data

volumes:
  music:
  navidromedata:
